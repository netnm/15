<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Tables</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Student Details</h1>

        <div class="tables-box">

            <!-- Table 1 -->
            <div class="table-card">
                <h2>Result Table</h2>
                <table>
                    <tr>
                        <th>Student Name</th>
                        <th>Result</th>
                    </tr>
                    <tr>
                        <td>Rahul</td>
                        <td>Pass</td>
                    </tr>
                    <tr>
                        <td>Sneha</td>
                        <td>Pass</td>
                    </tr>
                    <tr>
                        <td>Aman</td>
                        <td>Fail</td>
                    </tr>
                    <tr>
                        <td>Pooja</td>
                        <td>Pass</td>
                    </tr>
                </table>
            </div>

            <!-- Table 2 -->
            <div class="table-card">
                <h2>CGPA Table</h2>
                <table>
                    <tr>
                        <th>Student Name</th>
                        <th>CGPA</th>
                    </tr>
                    <tr>
                        <td>Rahul</td>
                        <td>8.2</td>
                    </tr>
                    <tr>
                        <td>Sneha</td>
                        <td>9.1</td>
                    </tr>
                    <tr>
                        <td>Aman</td>
                        <td>6.8</td>
                    </tr>
                    <tr>
                        <td>Pooja</td>
                        <td>8.7</td>
                    </tr>
                </table>
            </div>

        </div>
    </div>

</body>
</html>
